  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  .btn-outline { font-family: 'Source Sans 3', sans-serif; font-size: 14px; font-weight: 600; padding: 12px 28px; background: var(--bg); color: var(--navy); border: 2px solid var(--navy); border-radius: 6px; cursor: pointer; transition: all 0.2s; }

    .verdict-box { padding: 20px 18px; margin-bottom: 24px; }

<div class="container" id="app"></div>

<script>
const T = {
  green: "#047857", greenBg: "#ecfdf5", greenBorder: "#a7f3d0",
  amber: "#d97706", amberBg: "#fffbeb", amberBorder: "#fde68a",
  red: "#b91c1c", redBg: "#fef2f2", redBorder: "#fecaca",
  redDark: "#7f1d1d", navy: "#002C77", navyPale: "#e8eef7",
};

const VERSION = "v3.1 | 25 Feb 2026";

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
function bgFor(c) { return c === T.green ? T.greenBg : c === T.amber ? T.amberBg : c === T.navy ? T.navyPale : T.redBg; }
function borderFor(c) { return c === T.green ? T.greenBorder : c === T.amber ? T.amberBorder : c === T.navy ? (T.navy + "40") : T.redBorder; }

const QUESTIONS = {
  truth: { id: "truth", label: "THE FIRST QUESTION", question: "Does it matter if the output is accurate?", subtitle: "If the LLM gets this wrong, would anyone make a bad decision, take a wrong action, or believe something that isn\u2019t true?", options: [
    { value: "no", label: "No \u2014 this is just exploration", desc: "Brainstorming, rough drafts, creative ideas. It doesn\u2019t matter if the LLM makes things up.", color: T.green },
    { value: "yes", label: "Yes \u2014 accuracy matters", desc: "Someone will make decisions, take action, or present this as fact.", color: T.amber },
  ]},
  llmRole: { id: "llmRole", label: "HOW THE LLM IS USED", question: "Is the LLM producing the output itself, or using tools to do the work?", subtitle: "An LLM generating a report from its own knowledge is very different from an LLM that writes a database query, runs it, and summarises the results. The risks are different.", options: [
    { value: "producing", label: "The LLM produces the output directly", desc: "The LLM generates text, analysis, code, or labels from its own knowledge or from documents you provide.", color: T.red },
    { value: "orchestrating", label: "The LLM uses tools or systems", desc: "The LLM calls APIs, writes database queries, runs code, or uses other tools. The actual work is done by a reliable system, with the LLM as the intermediary.", color: T.amber },
  ]},
  taskType: { id: "taskType", label: "TASK TYPE", question: "What kind of task is this?", subtitle: "Different types of work have different ways of checking whether the LLM got it right.", options: [
    { value: "labelling", label: "Sorting or labelling data", desc: "Putting items into predefined categories: tagging sentiment, classifying topics, labelling types.", color: T.green },
    { value: "code", label: "Writing code or formulas", desc: "The LLM produces code, scripts, or formulas that can be run and tested.", color: T.amber },
    { value: "summarising", label: "Summarising or extracting", desc: "Condensing documents, extracting structured data from text, translating content. The LLM is transforming source material you provide.", color: T.amber },
    { value: "analysis", label: "Analysis, numbers, or written output", desc: "Insights, recommendations, calculations, reports \u2014 anything where the LLM is generating conclusions, not just transforming what you gave it.", color: T.red },
    { value: "other", label: "None of these fit", desc: "The task doesn\u2019t map neatly to any of the categories above.", color: T.navy },
  ]},
  finetuneData: { id: "finetuneData", label: "TRAINING DATA", question: "Do you have hundreds of correctly labelled examples to train the LLM on your specific task?", subtitle: "Without training on your actual data, the LLM is guessing based on general knowledge. Giving it a few examples in a prompt is not the same as proper training.", options: [
    { value: "yes", label: "Yes \u2014 we have enough labelled examples", desc: "Hundreds of items with verified correct labels that match our specific categories.", color: T.green },
    { value: "no", label: "No \u2014 we\u2019re giving it instructions or a few examples", desc: "We\u2019re relying on the LLM\u2019s general knowledge with some guidance.", color: T.red },
  ]},
  labelSpotCheck: { id: "labelSpotCheck", label: "SPOT-CHECKING", question: "Can you check a sample of the labels against human judgement?", subtitle: "Even without full training data, you can measure accuracy by having a person label a random sample and comparing it to the LLM\u2019s output. This tells you how much to trust the rest.", options: [
    { value: "yes", label: "Yes \u2014 we can sample and compare", desc: "We can have a person label a random subset and measure how often the LLM agrees.", color: T.amber },
    { value: "no", label: "No \u2014 we\u2019d just be reading the labels and deciding if they seem right", desc: "We don\u2019t have a clear way to check whether the labels are correct.", color: T.red },
  ]},
  frozenModel: { id: "frozenModel", label: "MODEL STABILITY", question: "Can you lock the LLM to a specific version so it doesn\u2019t change?", subtitle: "If the LLM provider updates the model, your trained performance can drop without warning. What worked at 95% accuracy yesterday could be 80% tomorrow.", options: [
    { value: "yes", label: "Yes \u2014 we can pin a specific version", desc: "Our provider lets us lock the model version and choose when to upgrade.", color: T.green },
    { value: "no", label: "No \u2014 the model could be updated without us knowing", desc: "The LLM provider may change the model at any time.", color: T.red },
  ]},
  unitTests: { id: "unitTests", label: "TESTABILITY", question: "Can you write automated tests that prove the code works correctly?", subtitle: "Tests that run the code against known inputs and check that it produces the right outputs \u2014 without a person having to judge it.", options: [
    { value: "yes", label: "Yes \u2014 we can test the output automatically", desc: "We can run the code and check the results against known-correct answers.", color: T.green },
    { value: "no", label: "No \u2014 a person would need to judge whether it\u2019s right", desc: "There\u2019s no automated way to check whether the code does what it should.", color: T.red },
  ]},
  securityReview: { id: "securityReview", label: "SECURITY", question: "Will someone or something check the code for security problems?", subtitle: "LLM-generated code can have hidden security flaws. Passing tests means the code works \u2014 it doesn\u2019t mean the code is safe.", options: [
    { value: "automated", label: "Yes \u2014 automated security scanning", desc: "Security scanning tools check for vulnerabilities automatically before the code is used.", color: T.green },
    { value: "human", label: "Yes \u2014 a person reviews for security", desc: "A qualified person checks for security issues before the code is used.", color: T.amber },
    { value: "no", label: "No \u2014 if it passes tests, we use it", desc: "We don\u2019t have a separate step to check for security problems.", color: T.red },
  ]},
  codeRepetition: { id: "codeRepetition", label: "HOW OFTEN", question: "Will this code generation happen regularly?", subtitle: "People check carefully the first time. By the fourth time, they skim. By the tenth, they stop checking altogether. This applies to security review too.", options: [
    { value: "once", label: "One-off or rare", desc: "A single task or something that happens occasionally.", color: T.green },
    { value: "recurring", label: "Recurring \u2014 regular code generation", desc: "The LLM will generate code on an ongoing basis, with a person reviewing each time.", color: T.amber },
  ]},
  sourceCheck: { id: "sourceCheck", label: "FAITHFULNESS", question: "Can you check whether the output is faithful to the source material?", subtitle: "Giving the LLM your documents doesn\u2019t prevent fabrication. It just means the fabrication sounds more like your data. Can you actually compare the output against the original?", options: [
    { value: "yes", label: "Yes \u2014 we can compare output to source", desc: "We can check that the summary, extraction, or translation accurately reflects the original material.", color: T.green },
    { value: "no", label: "No \u2014 we\u2019d be reading it and deciding if it seems right", desc: "The only way to check would be reading it and judging whether it looks faithful.", color: T.red },
  ]},
  sourceCheckMethod: { id: "sourceCheckMethod", label: "HOW YOU CHECK", question: "Is this checking done automatically, or does a person do it each time?", subtitle: "Automated checks don\u2019t get tired, distracted, or busy. People do.", options: [
    { value: "automated", label: "Automated \u2014 a system checks it", desc: "Scripts, validation rules, or comparison tools that check faithfulness without human involvement.", color: T.green },
    { value: "human", label: "A person checks it each time", desc: "Someone reviews the output against the source material manually.", color: T.amber },
  ]},
  sourceRepetition: { id: "sourceRepetition", label: "HOW OFTEN", question: "Will this task run more than once?", subtitle: "People check carefully the first time. By the fourth time, they skim. By the tenth, they stop checking altogether.", options: [
    { value: "once", label: "One-off or rare", desc: "A single task or something that happens occasionally. Someone will check this specific output.", color: T.green },
    { value: "recurring", label: "Recurring \u2014 weekly, monthly, or ongoing", desc: "This will run repeatedly, producing outputs that feed into ongoing work.", color: T.amber },
  ]},
  structuralVerification: { id: "structuralVerification", label: "CHECKING THE OUTPUT", question: "Can you check whether the output is correct without relying on the LLM or on gut feel?", subtitle: "Not \u201Cdoes it look right?\u201D \u2014 an LLM is specifically designed to produce things that look right. Can you actually compare it against real data or an independent source?", options: [
    { value: "yes", label: "Yes \u2014 we can check against real data or an independent source", desc: "We can compare the output to source data, a separate system, or a known-correct answer.", color: T.green },
    { value: "no", label: "No \u2014 we\u2019d be reading it and deciding if it seems right", desc: "The only way to check would be reading it and judging whether it\u2019s plausible.", color: T.red },
  ]},
  verificationMethod: { id: "verificationMethod", label: "HOW YOU CHECK", question: "Is this checking done automatically, or does a person do it each time?", subtitle: "Automated checks don\u2019t get tired, distracted, or busy. People do.", options: [
    { value: "automated", label: "Automated \u2014 a system checks it", desc: "Scripts, validation rules, or comparison tools that check the output without human involvement.", color: T.green },
    { value: "human", label: "A person checks it each time", desc: "Someone reviews the output against source data manually. This depends on their time and attention.", color: T.amber },
  ]},
  repetition: { id: "repetition", label: "HOW OFTEN", question: "Will this task run more than once?", subtitle: "People check carefully the first time. By the fourth time, they skim. By the tenth, they stop checking altogether.", options: [
    { value: "once", label: "One-off or rare", desc: "A single task or something that happens occasionally. Someone will check this specific output.", color: T.green },
    { value: "recurring", label: "Recurring \u2014 weekly, monthly, or ongoing", desc: "This will run repeatedly, producing outputs that feed into ongoing decisions.", color: T.amber },
  ]},
  orchTransparency: { id: "orchTransparency", label: "TRANSPARENCY", question: "Can you see what the LLM asked the tool to do?", subtitle: "If the LLM writes a database query, can you see the query? If it calls an API, can you see the request? The tool might be reliable, but you need to know whether the LLM asked the right question.", options: [
    { value: "yes", label: "Yes \u2014 we can see the LLM\u2019s instructions to the tool", desc: "The queries, API calls, or code the LLM generates are visible and reviewable.", color: T.green },
    { value: "no", label: "No \u2014 we only see the final output", desc: "We can\u2019t see what the LLM asked the tool to do, only what came back.", color: T.red },
  ]},
  orchRawOutput: { id: "orchRawOutput", label: "RAW OUTPUT", question: "Can you check the tool\u2019s raw output independently of the LLM\u2019s summary?", subtitle: "The tool might return correct data, but the LLM could misinterpret, selectively present, or incorrectly summarise the results. Can you see what the tool actually returned?", options: [
    { value: "yes", label: "Yes \u2014 we can access the tool\u2019s raw results", desc: "We can see the actual database results, API response, or calculation output before the LLM processes it.", color: T.green },
    { value: "no", label: "No \u2014 we only see the LLM\u2019s interpretation", desc: "The LLM summarises or reformats the tool\u2019s output, and we can\u2019t easily check the original.", color: T.red },
  ]},
  orchLogging: { id: "orchLogging", label: "AUDIT TRAIL", question: "Is the full chain logged: what was asked, what the tool returned, and how the LLM presented it?", subtitle: "Without logs, you can\u2019t diagnose problems after the fact. If something goes wrong in a multi-step process, you need to see where the chain broke.", options: [
    { value: "yes", label: "Yes \u2014 the full chain is logged", desc: "Every step is recorded: the LLM\u2019s request, the tool\u2019s response, and the LLM\u2019s final output.", color: T.green },
    { value: "no", label: "No \u2014 we don\u2019t have complete logs", desc: "Some or all of the chain is not recorded.", color: T.amber },
  ]},
  orchReviewMethod: { id: "orchReviewMethod", label: "HOW YOU CHECK", question: "Is the chain reviewed automatically, or does a person check it?", subtitle: "Automated checks can compare the LLM\u2019s query to expected patterns, validate the tool\u2019s output, and flag discrepancies. A person doing this will eventually stop.", options: [
    { value: "automated", label: "Automated \u2014 a system validates the chain", desc: "Scripts or monitoring tools check that the LLM asked the right question and faithfully reported the answer.", color: T.green },
    { value: "human", label: "A person reviews it", desc: "Someone checks the LLM\u2019s queries and compares the final output to the tool\u2019s raw results.", color: T.amber },
  ]},
  orchRepetition: { id: "orchRepetition", label: "HOW OFTEN", question: "Will this orchestrated task run more than once?", subtitle: "People check carefully the first time. By the fourth time, they skim. By the tenth, they stop checking altogether.", options: [
    { value: "once", label: "One-off or rare", desc: "A single task or something that happens occasionally.", color: T.green },
    { value: "recurring", label: "Recurring \u2014 regular or ongoing", desc: "This will run repeatedly as part of an ongoing process.", color: T.amber },
  ]},
};

// ─── ROUTING ───
function getNextQuestion(ans) {
  if (!ans.truth) return "truth";
  if (ans.truth === "no") return null;
  if (!ans.llmRole) return "llmRole";

  if (ans.llmRole === "orchestrating") {
    if (!ans.orchTransparency) return "orchTransparency"; if (ans.orchTransparency === "no") return null;
    if (!ans.orchRawOutput) return "orchRawOutput"; if (ans.orchRawOutput === "no") return null;
    if (!ans.orchLogging) return "orchLogging"; if (ans.orchLogging === "no") return null;
    if (!ans.orchReviewMethod) return "orchReviewMethod";
    if (ans.orchReviewMethod === "automated") return null;
    if (!ans.orchRepetition) return "orchRepetition"; return null;
  }

  if (!ans.taskType) return "taskType";
  if (ans.taskType === "labelling") { if (!ans.finetuneData) return "finetuneData"; if (ans.finetuneData === "no") { if (!ans.labelSpotCheck) return "labelSpotCheck"; return null; } if (!ans.frozenModel) return "frozenModel"; return null; }
  if (ans.taskType === "code") {
    if (!ans.unitTests) return "unitTests"; if (ans.unitTests === "no") return null;
    if (!ans.securityReview) return "securityReview"; if (ans.securityReview === "no") return null;
    if (ans.securityReview === "human") { if (!ans.codeRepetition) return "codeRepetition"; return null; }
    return null;
  }
  if (ans.taskType === "summarising") {
    if (!ans.sourceCheck) return "sourceCheck"; if (ans.sourceCheck === "no") return null;
    if (!ans.sourceCheckMethod) return "sourceCheckMethod";
    if (!ans.sourceRepetition) return "sourceRepetition"; return null;
  }
  if (ans.taskType === "analysis") { if (!ans.structuralVerification) return "structuralVerification"; if (ans.structuralVerification === "no") return null; if (!ans.verificationMethod) return "verificationMethod"; if (!ans.repetition) return "repetition"; return null; }
  if (ans.taskType === "other") return null;
  return null;
}

// ─── OUTCOMES ───
function getOutcome(ans) {
  if (ans.truth === "no") return {
    level: "clear", color: T.green, label: "GO AHEAD",
    summary: "Accuracy doesn\u2019t matter for this task. LLMs are great for brainstorming, drafting, and exploring ideas where it doesn\u2019t matter if some of the output is made up. Use it freely.",

function getAnsweredPath(ans) {
  const path = [];
  const order = ["truth", "llmRole", "orchTransparency", "orchRawOutput", "orchLogging", "orchReviewMethod", "orchRepetition", "taskType", "finetuneData", "labelSpotCheck", "frozenModel", "unitTests", "securityReview", "codeRepetition", "sourceCheck", "sourceCheckMethod", "sourceRepetition", "structuralVerification", "verificationMethod", "repetition"];
  for (const qId of order) {
    if (ans[qId]) {
      const q = QUESTIONS[qId];
      const opt = q.options.find(o => o.value === ans[qId]);
      path.push({ question: q.question, answer: opt.label, color: opt.color });
    }
  }
  return path;
}

function getQuestionHistory(ans) {
  const history = [];
  const simulate = {};
  const allKeys = ["truth", "llmRole", "orchTransparency", "orchRawOutput", "orchLogging", "orchReviewMethod", "orchRepetition", "taskType", "finetuneData", "labelSpotCheck", "frozenModel", "unitTests", "securityReview", "codeRepetition", "sourceCheck", "sourceCheckMethod", "sourceRepetition", "structuralVerification", "verificationMethod", "repetition"];
  for (const key of allKeys) {
    if (!ans[key]) continue;
    const nextQ = getNextQuestion(simulate);
    if (nextQ === key) { history.push(key); simulate[key] = ans[key]; }
  }
  return history;
}

    ${branch('HUMAN', 5)}${node('Will this task repeat?', T.navy, 5, true)}
    ${branch('ONE-OFF', 6)}${outcome('CAUTION - verify this one', T.amber, 6)}
    ${branch('RECURRING', 6)}${outcome("DON'T USE - checking will fade", T.red, 6)}
    ${branch('NONE OF THESE FIT', 3)}${outcome('CAUTION - assess the risk yourself', T.amber, 3)}
  `;
}

// ─── STATE ───
let taskDescription = "";
let answers = {};
let phase = "input";
let currentQuestion = null;
let copied = false;

function render() {
  const app = document.getElementById("app");
  if (phase === "input") app.innerHTML = renderInput();
  else if (phase === "question") app.innerHTML = renderQuestion();
  else app.innerHTML = renderOutcome();
  bindEvents();
}

// ─── INPUT ───
function renderInput() {
  const valid = taskDescription.trim().length >= 10;
  let exCards = '';
  for (const ex of EXAMPLES) {
    exCards += `<button class="example-btn" data-example="${esc(ex.label)}">
      <span class="mono" style="font-size:10px;font-weight:600;letter-spacing:1px;color:${ex.tagColor};padding:3px 8px;background:${ex.tagBg};border:1px solid ${ex.tagBorder};border-radius:4px;flex-shrink:0">${ex.tag}</span>
      <span style="font-size:15px;color:var(--text);font-weight:500">${esc(ex.label)}</span>
    </button>`;
  }

  return `
    <header style="margin-bottom:44px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--navy)"></div>
        <span class="mono" style="font-size:11px;font-weight:600;letter-spacing:3px;color:var(--navy)">CASSANDRA</span>
      </div>
      <h1 class="serif" style="font-size:clamp(28px,5vw,42px);font-weight:600;line-height:1.2;margin:0 0 12px;color:var(--navy)">
        Should you trust your <em style="font-weight:400">LLM output</em>?
      </h1>
      <p style="font-size:16px;color:var(--text-secondary);font-weight:400;line-height:1.7;max-width:580px">
        Describe what you want your LLM to do. Cassandra asks a few questions to help you decide whether an LLM is the right tool for this task \u2014 and what checks you\u2019d need to trust the results.
      </p>
      <div style="width:48px;height:3px;background:var(--navy);margin-top:20px;border-radius:2px"></div>
    </header>

    <div style="margin-bottom:32px">
      <div class="expandable">
        <button class="expandable-header" data-expand="reddit">
          <span>The VP and fake data</span>
          <span class="expandable-chevron" id="chevron-reddit">\u25BE</span>
        </button>
        <div id="content-reddit" style="display:none">
          <div class="expandable-content">
            <p style="font-size:14px;color:var(--text-body);line-height:1.7;margin-bottom:14px">
              A story shared on Reddit described an LLM agent that fabricated sales analytics for 3 months. The VP reportedly made territory decisions on fake data. The CFO presented it to the board. An analyst who raised concerns was told they were \u201Cslowing down innovation.\u201D It was caught by accident.
            </p>
            <p style="font-size:14px;color:var(--text-body);line-height:1.7;margin-bottom:14px">
              An LLM doesn\u2019t work like a calculator or a database. It predicts the most plausible-sounding answer based on patterns it learned during training. Sometimes that answer is accurate. Sometimes it\u2019s completely made up. The LLM doesn\u2019t know the difference, and it sounds equally confident either way.
            </p>
            <p style="font-size:14px;color:var(--text-body);line-height:1.7">
              So the question isn\u2019t \u201Ccan I trust this output?\u201D \u2014 it\u2019s <strong>\u201Cdo I have a way to check whether this output is actually right?\u201D</strong>
            </p>
          </div>
        </div>
      </div>
      <div class="expandable">
        <button class="expandable-header" data-expand="what">
          <span>What does this tool do?</span>
          <span class="expandable-chevron" id="chevron-what">\u25BE</span>
        </button>
        <div id="content-what" style="display:none">
          <div class="expandable-content">
            <p style="font-size:14px;color:var(--text-body);line-height:1.7">
              Describe what you want your LLM to do, then answer a few questions about it. Cassandra follows a decision tree to reach one of three answers: <strong>go ahead</strong> (with the right checks in place), <strong>go ahead with caution</strong> (with specific conditions), or <strong>don\u2019t use an LLM for this</strong>. Some tasks simply aren\u2019t a good fit for LLMs, and Cassandra will tell you that directly.
            </p>
          </div>
        </div>
      </div>
      <div class="expandable">
        <button class="expandable-header" data-expand="tree">
          <span>Decision tree</span>
          <span class="expandable-chevron" id="chevron-tree">\u25BE</span>
        </button>
        <div id="content-tree" style="display:none;overflow-x:auto">
          <div class="expandable-content">
            <p style="font-size:14px;color:var(--text-body);line-height:1.7;margin-bottom:16px">Cassandra walks you through between 1 and 7 of these questions, depending on the path your answers take.</p>
            ${renderDecisionTree()}
          </div>
        </div>
      </div>
    </div>

    <div style="position:relative;margin-bottom:20px">
      <textarea id="task-textarea" class="task-textarea" placeholder="Describe what you want your LLM to do...\n\ne.g. 'Produce weekly sales reports showing conversion rates and revenue by territory for the VP and CFO.'" style="min-height:180px">${esc(taskDescription)}</textarea>
    </div>
    <div class="start-row">
      <button class="btn-primary" data-action="start" style="font-size:15px;padding:14px 28px" id="start-btn" ${valid ? '' : 'disabled'}>Start Assessment</button>
      <span class="mono" style="font-size:11px;color:var(--text-tertiary)" id="start-hint">${valid ? '\u2318+Enter' : 'Describe your task first'}</span>
    </div>
    <div>
      <span class="mono" style="font-size:11px;font-weight:600;letter-spacing:2px;color:var(--text-label);display:block;margin-bottom:12px">TRY AN EXAMPLE</span>
      <div style="display:flex;flex-direction:column;gap:8px">${exCards}</div>
    </div>

    <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-top:32px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:${T.green}"></div><span style="font-size:12px;color:var(--text-tertiary)">Lower risk</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:${T.amber}"></div><span style="font-size:12px;color:var(--text-tertiary)">Conditional</span></div>
      <div style="display:flex;align-items:center;gap:6px"><div style="width:10px;height:10px;border-radius:50%;background:${T.red}"></div><span style="font-size:12px;color:var(--text-tertiary)">Higher risk</span></div>
    </div>

    <div style="margin-top:48px;text-align:center">
      <span class="mono" style="font-size:10px;color:#9ca3af;letter-spacing:1px">${VERSION}</span>
    </div>`;
}

// ─── QUESTION ───
function renderQuestion() {
  const qId = currentQuestion;
  if (!qId) { phase = "outcome"; return renderOutcome(); }

  const q = QUESTIONS[qId];
  const current = answers[qId];
  const shortDesc = taskDescription.length > 200 ? taskDescription.substring(0, 200) + "\u2026" : taskDescription;
  const path = getAnsweredPath(answers);

  let pathHTML = '';
  if (path.length > 0) {
    pathHTML = '<div style="margin-bottom:24px">';
    for (let i = 0; i < path.length; i++) {
      const p = path[i];
      pathHTML += `<div class="path-node"><div class="path-dot" style="background:${p.color}"></div><span style="font-size:13px;color:var(--text);font-weight:600">${esc(p.answer)}</span></div>`;
      if (i < path.length - 1) pathHTML += `<div class="path-line" style="background:var(--border)"></div>`;
    }
    pathHTML += `<div class="path-line" style="background:var(--border)"></div>`;
    pathHTML += '</div>';
  }

  let opts = '';
  for (const opt of q.options) {
    const sel = current === opt.value;
    const bg = sel ? bgFor(opt.color) : 'var(--bg)';
    const bc = sel ? borderFor(opt.color) : 'var(--border)';
    const bw = sel ? '2px' : '1px';
    opts += `<button class="option-btn" data-select="${opt.value}" style="background:${bg};border:${bw} solid ${bc}">
      <span class="radio-outer" style="border-color:${sel ? opt.color : 'var(--card-border)'}">
        ${sel ? `<span style="width:10px;height:10px;border-radius:50%;background:${opt.color};display:block"></span>` : ''}
      </span>
      <div style="flex:1">
        <div style="font-size:15px;font-weight:${sel ? 600 : 500};color:${sel ? 'var(--text)' : 'var(--text-body)'};margin-bottom:3px">${esc(opt.label)}</div>
        <div style="font-size:13px;color:var(--text-tertiary);font-weight:400;line-height:1.6">${esc(opt.desc)}</div>
      </div>
    </button>`;
  }

  return `<div class="fade-up">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <span class="mono" style="font-size:10px;font-weight:600;letter-spacing:2px;color:var(--text-label)">${q.label}</span>
      <button class="btn-box" data-action="back">Back</button>
    </div>
    <div class="card" style="margin-bottom:20px;background:var(--navy-pale);border-color:#002C7720;padding:12px 18px">
      <span class="mono" style="font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--navy);display:block;margin-bottom:4px">YOUR TASK</span>
      <p style="font-size:13px;color:var(--text-body);line-height:1.6;margin:0">${esc(shortDesc)}</p>
    </div>
    ${pathHTML}
    <h2 class="serif" style="font-size:24px;font-weight:600;color:var(--navy);margin:0 0 6px;line-height:1.3">${q.question}</h2>
    <p style="font-size:14px;color:var(--text-secondary);margin:0 0 28px;line-height:1.6;font-style:italic">${q.subtitle}</p>
    <div style="display:flex;flex-direction:column;gap:8px">${opts}</div>
    <div style="margin-top:24px">
      <button class="btn-primary" data-action="next" ${current ? '' : 'disabled'}>Next</button>
    </div>
  </div>`;
}

// ─── OUTCOME ───
function renderOutcome() {
  const outcome = getOutcome(answers);
  if (!outcome) { phase = "input"; return renderInput(); }

  const path = getAnsweredPath(answers);
  const shortDesc = taskDescription.length > 300 ? taskDescription.substring(0, 300) + "\u2026" : taskDescription;

  let pathHTML = '<div style="margin-bottom:32px">';
  pathHTML += '<h3 class="mono" style="font-size:11px;font-weight:600;letter-spacing:2px;color:var(--text-label);margin-bottom:12px">YOUR DECISION PATH</h3>';
  for (let i = 0; i < path.length; i++) {
    const p = path[i];
    pathHTML += `<div style="display:flex;align-items:flex-start;gap:14px;padding:6px 0">
      <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
        <div style="width:10px;height:10px;border-radius:50%;background:${p.color}"></div>
        ${i < path.length - 1 ? '<div style="width:2px;height:28px;background:var(--border);margin-top:4px"></div>' : ''}
      </div>
      <div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-bottom:2px">${esc(p.question)}</div>
        <div style="font-size:14px;color:var(--text);font-weight:600">${esc(p.answer)}</div>
      </div>
    </div>`;
  }
  pathHTML += '</div>';

  let guidance = '';
  if (outcome.guidance.length > 0) {
    guidance = '<div style="margin-bottom:32px"><h3 class="mono" style="font-size:11px;font-weight:600;letter-spacing:2px;color:var(--text-label);margin-bottom:12px">';
    guidance += outcome.level === "dont_use" ? 'WHAT TO DO INSTEAD' : 'WHAT YOU NEED IN PLACE';
    guidance += '</h3><div style="display:flex;flex-direction:column;gap:6px">';
    outcome.guidance.forEach((g, i) => {
      guidance += `<div class="card guidance-num">
        <span class="mono" style="font-size:11px;color:var(--navy);flex-shrink:0;margin-top:2px;font-weight:600">${String(i+1).padStart(2,'0')}</span>
        <span style="font-size:14px;color:var(--text-body);line-height:1.65">${esc(g)}</span>
      </div>`;
    });
    guidance += '</div></div>';
  }

  let challenge = '';
  if (outcome.challenge) {
    challenge = `<div class="challenge-box" style="background:${bgFor(outcome.color)};border:1px solid ${borderFor(outcome.color)}">
      <span class="mono" style="font-size:10px;font-weight:600;letter-spacing:2px;color:${outcome.color};display:block;margin-bottom:8px">CHALLENGE</span>
      <p class="serif" style="font-size:17px;font-style:italic;color:var(--text);line-height:1.7;margin:0;font-weight:500">${esc(outcome.challenge)}</p>
    </div>`;
  }

  let redditSection = '';
  if (outcome.level === "dont_use" && answers.taskType === "analysis" && answers.structuralVerification === "no") {
    let modes = '';
    for (const fm of REDDIT_FAILURE_MODES) modes += `<div class="card"><span style="font-size:14px;color:var(--text);font-weight:600;display:block;margin-bottom:4px">${esc(fm.mode)}</span><span style="font-size:14px;color:var(--text-secondary);line-height:1.6">${esc(fm.desc)}</span></div>`;
    redditSection = `<div style="margin-bottom:32px">
      <h3 class="mono" style="font-size:11px;font-weight:600;letter-spacing:2px;color:var(--text-label);margin-bottom:6px">HOW THE REDDIT FAILURE HAPPENED</h3>
      <p style="font-size:14px;color:var(--text-secondary);font-style:italic;line-height:1.65;margin:0 0 14px">The Reddit story doesn\u2019t say exactly what went wrong technically. But every one of these scenarios produces the same result: numbers that look real but aren\u2019t.</p>
      <div style="display:flex;flex-direction:column;gap:6px">${modes}</div>
    </div>`;
  }

  // Conditional principle
  let principle;
  if (outcome.level === "proceed") {
    principle = `<p class="serif" style="font-size:17px;font-style:italic;color:var(--navy);line-height:1.6;margin:0 0 4px;font-weight:500">\u201CYou\u2019ve built the checks. Now look after them.\u201D</p>
      <p style="font-size:14px;color:var(--text-secondary);line-height:1.6">The systems you have in place are your safety net. Keep them working.</p>`;
  } else if (outcome.level === "clear") {
    principle = `<p class="serif" style="font-size:17px;font-style:italic;color:var(--navy);line-height:1.6;margin:0 0 4px;font-weight:500">\u201CExplore freely. Label clearly.\u201D</p>
      <p style="font-size:14px;color:var(--text-secondary);line-height:1.6">When accuracy doesn\u2019t matter, LLMs are a great tool. Just make sure others know the output hasn\u2019t been checked.</p>`;
  } else {
    principle = `<p class="serif" style="font-size:17px;font-style:italic;color:var(--navy);line-height:1.6;margin:0 0 4px;font-weight:500">\u201CAutomatic checks beat good intentions every time.\u201D</p>
      <p style="font-size:14px;color:var(--text-secondary);line-height:1.6">Build systems where mistakes are caught automatically, not by someone remembering to look.</p>`;
  }

  // Copy text
  const copyText = generateCopyText(outcome, path);

  return `<div class="fade-up">
    <div class="top-actions">
      <button class="btn-box" data-action="back">Change last answer</button>
      <button class="btn-box" data-action="reset">Start over</button>
    </div>
    <div class="card" style="margin-bottom:24px;background:var(--navy-pale);border-color:#002C7720">
      <span class="mono" style="font-size:10px;font-weight:600;letter-spacing:1.5px;color:var(--navy);display:block;margin-bottom:6px">TASK DESCRIPTION</span>
      <p style="font-size:14px;color:var(--text-body);line-height:1.65;margin:0">${esc(shortDesc)}</p>
    </div>
    <div class="verdict-box" style="background:${bgFor(outcome.color)};border:1px solid ${borderFor(outcome.color)}">
      <div style="position:absolute;top:0;left:0;width:4px;height:100%;background:${outcome.color}"></div>
      <div class="mono" style="font-size:12px;font-weight:600;letter-spacing:3px;color:${outcome.color};margin-bottom:12px">${outcome.label}</div>
      <p style="font-size:16px;color:var(--text-body);line-height:1.75;font-weight:400">${esc(outcome.summary)}</p>
    </div>
    <p style="font-size:13px;color:var(--text-tertiary);line-height:1.6;margin:0 0 28px;font-style:italic">
      Cassandra is a thinking tool, not a certified assessment. It helps you ask the right questions about how you\u2019re using LLMs. The answer is a starting point for your own judgement, not a replacement for it.
    </p>
    ${pathHTML}
    ${guidance}
    ${redditSection}
    ${challenge}
    <div class="principle-box">${principle}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn-outline" data-action="reset" style="flex:1;min-width:200px">Assess Another Task</button>
      <button class="btn-box" data-action="copy" id="copy-btn" style="padding:12px 28px;font-size:14px">${copied ? 'Copied!' : 'Copy results'}</button>
    </div>
    <div style="margin-top:48px;text-align:center">
      <span class="mono" style="font-size:10px;color:#9ca3af;letter-spacing:1px">${VERSION}</span>
    </div>
    <textarea id="copy-data" style="position:absolute;left:-9999px">${esc(copyText)}</textarea>
  </div>`;
}

function generateCopyText(outcome, path) {
  let text = "CASSANDRA ASSESSMENT\n\n";
  text += "Task: " + taskDescription + "\n\n";
  text += "Result: " + outcome.label + "\n\n";
  text += outcome.summary + "\n\n";
  text += "Decision path:\n";
  path.forEach(p => { text += "  " + p.question + " \u2192 " + p.answer + "\n"; });
  if (outcome.guidance.length > 0) {
    text += "\n" + (outcome.level === "dont_use" ? "What to do instead:" : "What you need in place:") + "\n";
    outcome.guidance.forEach((g, i) => { text += "  " + (i+1) + ". " + g + "\n"; });
  }
  if (outcome.challenge) text += "\nChallenge: " + outcome.challenge + "\n";
  text += "\n" + VERSION;
  return text;
}

// ─── EVENT BINDING ───
function bindEvents() {
  document.querySelectorAll("[data-expand]").forEach(btn => {
    btn.addEventListener("click", () => {
      const id = btn.dataset.expand;
      const content = document.getElementById("content-" + id);
      const chevron = document.getElementById("chevron-" + id);
      if (content.style.display === "none") { content.style.display = "block"; chevron.style.transform = "rotate(180deg)"; }
      else { content.style.display = "none"; chevron.style.transform = "rotate(0deg)"; }
    });
  });

  const textarea = document.getElementById("task-textarea");
  const startBtn = document.getElementById("start-btn");
  const startHint = document.getElementById("start-hint");
  if (textarea && startBtn) {
    textarea.addEventListener("input", () => {
      taskDescription = textarea.value;
      const valid = taskDescription.trim().length >= 10;
      startBtn.disabled = !valid;
      if (startHint) startHint.textContent = valid ? "\u2318+Enter" : "Describe your task first";
    });
    textarea.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey) && taskDescription.trim().length >= 10) {
        answers = {}; currentQuestion = "truth"; phase = "question"; render();
      }
    });
  }

  document.querySelectorAll("[data-example]").forEach(btn => {
    btn.addEventListener("click", () => {
      const ex = EXAMPLES.find(e => e.label === btn.dataset.example);
      if (ex) {
        taskDescription = ex.description;
        render();
        setTimeout(() => {
          const ta = document.getElementById("task-textarea");
          if (ta) ta.scrollIntoView({ behavior: "smooth", block: "center" });
          const sb = document.getElementById("start-btn");
          if (sb) { sb.style.animation = "btnPulse 1.5s ease-in-out 3"; setTimeout(() => sb.style.animation = "", 4500); }
        }, 50);
      }
    });
  });

  document.querySelectorAll("[data-select]").forEach(btn => {
    btn.addEventListener("click", () => {
      if (currentQuestion) {
        answers[currentQuestion] = btn.dataset.select;
        render();
      }
    });
  });

  document.querySelectorAll("[data-action]").forEach(btn => {
    btn.addEventListener("click", () => {
      const a = btn.dataset.action;
      if (a === "start" && taskDescription.trim().length >= 10) {
        answers = {}; currentQuestion = "truth"; phase = "question"; render();
      }
      else if (a === "next") {
        const nextAfterCurrent = getNextQuestion(answers);
        if (!nextAfterCurrent) { phase = "outcome"; render(); window.scrollTo({ top: 0, behavior: "smooth" }); }
        else { currentQuestion = nextAfterCurrent; render(); }
      }
      else if (a === "back") {
        if (phase === "outcome") {
          phase = "question"; copied = false;
          const history = getQuestionHistory(answers);
          if (history.length > 0) {
            const lastQ = history[history.length - 1];
            delete answers[lastQ];
            currentQuestion = lastQ;
          }
          render();
        } else {
          const history = getQuestionHistory(answers);
          const currentIdx = history.indexOf(currentQuestion);
          if (currentIdx > 0) {
            const prevQ = history[currentIdx - 1];
            delete answers[prevQ];
            currentQuestion = prevQ;
            render();
          } else {
            delete answers[currentQuestion];
            phase = "input"; currentQuestion = null; render();
          }
        }
      }
      else if (a === "reset") { taskDescription = ""; answers = {}; currentQuestion = null; copied = false; phase = "input"; render(); }
      else if (a === "copy") {
        const el = document.getElementById("copy-data");
        if (el) {
          navigator.clipboard.writeText(el.value).then(() => {
            copied = true; render();
            setTimeout(() => { copied = false; render(); }, 2000);
          }).catch(() => {
            el.style.left = "0"; el.select();
            document.execCommand("copy");
            el.style.left = "-9999px";
            copied = true; render();
            setTimeout(() => { copied = false; render(); }, 2000);
          });
        }
      }
    });
  });
}

render();
</script>
</body>
</html>
